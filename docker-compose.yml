version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: clientnest-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - clientnest_data:/var/lib/postgresql/data

volumes:
  clientnest_data: